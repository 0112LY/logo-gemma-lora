ENV:
  MODELSCOPE_CACHE: outputs/cache/modelscope
  HF_HOME: outputs/cache/huggingface

model: models/gemma-3-270m-it
check_model: false
dataset:
  - data/train_filtered.jsonl
val_dataset:
  - data/valid.jsonl
split_dataset_ratio: 0.0

tuner_type: lora
target_modules:
  - q_proj
  - v_proj
lora_rank: 4
lora_alpha: 4
lora_dropout: 0.05

torch_dtype: bfloat16
attn_impl: sdpa
max_length: 3584
truncation_strategy: delete
loss_scale: default

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true
learning_rate: 1.0e-6
max_steps: 55
lr_scheduler_type: constant
warmup_ratio: 0.0

eval_strategy: steps
eval_steps: 1
save_strategy: steps
save_steps: 1
save_total_limit: 60
load_best_model_at_end: false
metric_for_best_model: eval_loss
greater_is_better: false
logging_steps: 1

seed: 42
data_seed: 42
dataset_num_proc: 1
dataloader_num_workers: 0
report_to: "none"
output_dir: outputs/exp5_full_conservative
add_version: false
