# Required minimal LoRA baseline. Keep synchronized with train_config.yaml.
ENV:
  MODELSCOPE_CACHE: outputs/cache/modelscope
  HF_HOME: outputs/cache/huggingface
model: models/gemma-3-270m-it
check_model: false
dataset: [data/train_filtered.jsonl]
val_dataset: [data/valid.jsonl]
split_dataset_ratio: 0.0
tuner_type: lora
target_modules: [q_proj, v_proj]
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
torch_dtype: bfloat16
attn_impl: sdpa
max_length: 3584
truncation_strategy: delete
loss_scale: default
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 8
gradient_checkpointing: true
learning_rate: 2.0e-5
num_train_epochs: 1
lr_scheduler_type: cosine
warmup_ratio: 0.05
eval_strategy: steps
eval_steps: 5
save_strategy: steps
save_steps: 5
save_total_limit: 10
load_best_model_at_end: true
metric_for_best_model: eval_loss
greater_is_better: false
logging_steps: 1
seed: 42
data_seed: 42
dataset_num_proc: 1
dataloader_num_workers: 0
report_to: "none"
output_dir: outputs/exp5_q4_rank8_lr2e-5
add_version: false

quant_method: bnb
quant_bits: 4
bnb_4bit_compute_dtype: bfloat16
bnb_4bit_quant_type: nf4
bnb_4bit_use_double_quant: true
